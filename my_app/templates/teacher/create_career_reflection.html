<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Career Reflection</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:#f4f7fb;
            color:#1e293b;
        }

        .back{
            position:fixed;
            top:20px;
            left:20px;
            background:white;
            padding:10px 14px;
            border-radius:10px;
            box-shadow:0 5px 15px rgba(0,0,0,0.08);
            text-decoration:none;
            color:#0f172a;
            font-weight:500;
        }

        .container{
            max-width:700px;
            margin:80px auto;
            background:white;
            padding:25px;
            border-radius:18px;
            box-shadow:0 10px 25px rgba(0,0,0,0.06);
        }

        h2{
            margin-bottom:20px;
        }

        textarea{
            width:100%;
            height:150px;
            padding:12px;
            border-radius:10px;
            border:1px solid #ddd;
            margin-top:10px;
        }

        .btn{
            margin-top:15px;
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            background:#0f172a;
            color:white;
            cursor:pointer;
        }

        .btn:hover{
            background:#1e293b;
        }

    </style>
</head>

<body>

<a href="{% url 'career_exploration' %}" class="back">← Back</a>

<div class="container">

    <h2>Create Reflection Prompt</h2>

    <form method="POST">
        {% csrf_token %}

        <label>Reflection Question</label>
        <textarea name="prompt" placeholder="Example: Why do you want to pursue IT?" required></textarea>

        <label>XP Points</label>
        <input type="number" name="xp" value="70">

        <button class="btn">Save Prompt</button>
    </form>

</div>

</body>
</html>
